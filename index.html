<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 1. TAJUK UTAMA HALAMAN (Akan dipaparkan di tab pelayar & WhatsApp) -->
    <title>Pengenalan novel Surat-surat Aisha Hamdan</title>
    
    <!-- 1B. FAVICON (Ikon Kecil di Tab Pelayar) -->
    <!-- Anda boleh letakkan fail ikon (cth: favicon.png atau favicon.ico) di dalam folder utama project, atau gunakan URL gambar penuh -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/nVWw8hHH/Untitled-(64-x-64-px)-(1).png" />
    <link rel="shortcut icon" type="image/png" href="https://i.postimg.cc/nVWw8hHH/Untitled-(64-x-64-px)-(1).png" />
    
    <!-- 2. DESKRIPSI RINGKAS (Untuk Google Search & WhatsApp) -->
    <meta name="description" content="Halaman pengenalan novel Surat-surat Aisha Hamdan karya Izzat Anas yang bakal terbit." />

    <!-- 3. OPEN GRAPH (SANGAT PENTING UNTUK WHATSAPP/FACEBOOK PREVIEW) -->
    <!-- Tukar kandungan 'content' di bawah mengikut kesesuaian anda -->
    <meta property="og:title" content="Iman. Cinta. Sastera." />
    <meta property="og:description" content="Surat-surat Aisha Hamdan — Karya sastera terbaharu oleh Izzat Anas." />
    <meta property="og:image" content="https://sah.malians.group/assets/og-image.jpg" /> <!-- Masukkan URL imej preview jika ada -->
    <meta property="og:url" content="https://sah.malians.group" />
    <meta property="og:type" content="website" />
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
